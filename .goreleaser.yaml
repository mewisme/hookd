# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: hookd

before:
  hooks:
    - go mod tidy

builds:
  - id: hookd
    main: ./cmd/server
    binary: hookd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers_v2:
  - id: hookd
    ids:
      - hookd
    images:
      - mewisme/hookd
      - ghcr.io/mewisme/hookd
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: hookd
      org.opencontainers.image.description: Pluggable webhook runner (Go + YAML)
      org.opencontainers.image.source: https://github.com/mewisme/hookd
      org.opencontainers.image.url: https://github.com/mewisme/hookd
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: MIT

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: mewisme
    name: hookd
